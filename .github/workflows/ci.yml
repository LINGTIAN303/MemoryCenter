name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # 跨平台编译矩阵
  # ============================================================================
  build-and-test:
    name: Build & Test (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: hippocampus.dll
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: libhippocampus.so
          # Linux aarch64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: libhippocampus.so
          # macOS x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: libhippocampus.dylib
          # macOS aarch64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: libhippocampus.dylib

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Check formatting
        run: cargo fmt --all -- --check
        continue-on-error: true  # MVP 阶段不阻断

      - name: Build (core)
        run: cargo build --package hippocampus-core --verbose

      - name: Build (FFI, cdylib)
        run: cargo build --package hippocampus-ffi --release --target ${{ matrix.target }}

      - name: Run tests (core)
        run: cargo test --package hippocampus-core --verbose

      - name: Verify FFI artifact
        shell: bash
        run: |
          ls -la target/${{ matrix.target }}/release/${{ matrix.artifact }} || \
          ls -la target/release/${{ matrix.artifact }} || \
          echo "FFI artifact not found (may be expected on some targets)"

  # ============================================================================
  # Clippy 静态检查（仅 Linux x86_64）
  # ============================================================================
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-clippy-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true  # MVP 阶段不阻断

  # ============================================================================
  # C 集成测试（实际编译 C 程序加载动态库验证 ABI）
  # ============================================================================
  c-integration-test:
    name: C Integration Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-c-test-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Build Rust dynamic library
        run: cargo build --release -p hippocampus-ffi

      - name: Build & Run C demo
        run: |
          cd examples/c
          gcc demo.c -o demo \
            -I ../../crates/hippocampus-ffi/include \
            -L ../../target/release \
            -lhippocampus -lpthread -ldl
          LD_LIBRARY_PATH=../../target/release ./demo

      - name: Build & Run C integration test
        run: |
          cd examples/c
          gcc test.c -o test \
            -I ../../crates/hippocampus-ffi/include \
            -L ../../target/release \
            -lhippocampus -lpthread -ldl
          LD_LIBRARY_PATH=../../target/release ./test

  # ============================================================================
  # 文档构建
  # ============================================================================
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build docs
        run: cargo doc --no-deps --all-features
