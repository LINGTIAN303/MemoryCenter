# MemoryCenter Demo 站点（mc-demo.lingtian.abrdns.com）
#
# 部署位置：/etc/nginx/sites-enabled/mc-demo-memory-center
#
# 双职责：
#   1. 根路径 / 服务 creative-proposal.html 静态页（报名期创意提案）
#   2. /demo/ 服务演示动画静态页
#   3. /api/v1/ /mcp /healthz 反代后端 API（127.0.0.1:8766）
#
# 静态文件目录：/var/www/mc-demo/

server {
    listen 80;
    server_name 162.211.183.236.sslip.io mc-demo.lingtian.abrdns.com mc-demo.openworld.dpdns.org;

    # 根路径：服务静态创意提案 HTML
    location = / {
        root /var/www/mc-demo;
        try_files /index.html =404;
    }

    # 演示动画目录
    location /demo/ {
        alias /var/www/mc-demo/demo/;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # 静态资源缓存
    location ~* \.(html|css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /var/www/mc-demo;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # REST API 反代
    location /api/ {
        proxy_pass http://127.0.0.1:8766;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # MCP Streamable HTTP 端点（SSE 流支持）
    location /mcp {
        proxy_pass http://127.0.0.1:8766;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 健康检查端点
    location /healthz {
        proxy_pass http://127.0.0.1:8766/healthz;
        proxy_set_header Host $host;
    }

    # 访问日志
    access_log /var/log/nginx/mc-demo-access.log;
    error_log  /var/log/nginx/mc-demo-error.log;
}
