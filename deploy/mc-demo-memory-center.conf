# MemoryCenter Demo 站点（mc-demo.openworld.dpdns.org）
#
# 部署位置：/etc/nginx/sites-enabled/mc-demo-memory-center
#
# 与 openworld.dpdns.org 站点共用 80 端口，靠 server_name 区分请求。
# 通过 Cloudflare 代理访问时，Cloudflare 边缘自动 HTTPS，回源用 HTTP（Flexible 模式）。
#
# 反代目标：127.0.0.1:8766（memory-center-demo 服务，绑定 127.0.0.1）
# API Key：trae-contest-demo-key-2026（请求头 X-API-Key）

server {
    listen 80;
    server_name mc-demo.openworld.dpdns.org;

    # 默认 REST API 反代
    location / {
        proxy_pass http://127.0.0.1:8766;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # MCP Streamable HTTP 端点（SSE 流支持）
    location /mcp {
        proxy_pass http://127.0.0.1:8766;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE 长连接优化
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 健康检查端点
    location /healthz {
        proxy_pass http://127.0.0.1:8766/healthz;
        proxy_set_header Host $host;
    }

    # 访问日志（便于排查参赛期间流量）
    access_log /var/log/nginx/mc-demo-access.log;
    error_log  /var/log/nginx/mc-demo-error.log;
}
